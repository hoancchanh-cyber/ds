<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Hệ thống quản lý hồ sơ địa chính</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
background:#f1f5f9;
font-family:Segoe UI;
}

.sidebar{
width:240px;
position:fixed;
height:100vh;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
background:#334155;
border:none;
color:white;
padding:10px;
border-radius:6px;
}

.main{
margin-left:260px;
padding:25px;
}

.card-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.quahan{
background:#fecaca !important;
}

.sapdenhan{
background:#fef9c3 !important;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>📁 Hồ sơ địa chính</h4>

<button onclick="UI.show('dashboard')">Dashboard</button>
<button onclick="UI.show('add')">Thêm hồ sơ</button>
<button onclick="UI.show('list')">Danh sách</button>
<button onclick="Export.excel()">Xuất Excel</button>

</div>

<div class="main">

<h3>HỆ THỐNG QUẢN LÝ HỒ SƠ</h3>

<div id="dashboard"></div>

<div id="add" style="display:none"></div>

<div id="list" style="display:none">

<div class="card-box">

<table id="tableHoSo"></table>

</div>

</div>

</div>

<script>

/***********************
CONFIG
************************/

const CONFIG={

API:"YOUR_API_LINK"

}

/***********************
API SERVICE
************************/

const API={

async getHoSo(){

const r=await fetch(CONFIG.API+"?action=getHoSo")
return r.json()

},

async getThuTuc(){

const r=await fetch(CONFIG.API+"?action=getThuTuc")
return r.json()

},

async dashboard(){

const r=await fetch(CONFIG.API+"?action=dashboard")
return r.json()

},

async add(data){

await fetch(CONFIG.API+"?action=addHoSo",{

method:"POST",
body:JSON.stringify(data)

})

}

}

/***********************
UTILS
************************/

const Utils={

formatDate(d){

return new Date(d).toLocaleDateString()

}

}

/***********************
UI CONTROL
************************/

const UI={

show(id){

["dashboard","add","list"].forEach(s=>{

document.getElementById(s).style.display="none"

})

document.getElementById(id).style.display="block"

}

}

/***********************
TABLE MODULE
************************/

let table
let globalData=[]

const Table={

render(data){

globalData=data

if(table) table.destroy()

table=$('#tableHoSo').DataTable({

data:data.slice(1),

columns:data[0].map(h=>({title:h})),

createdRow:function(row,data){

if(data[11]==="Quá hạn"){

$(row).addClass("quahan")

}

if(data[11]==="Sắp đến hạn"){

$(row).addClass("sapdenhan")

}

}

})

}

}

/***********************
EXPORT
************************/

const Export={

excel(){

const ws=XLSX.utils.aoa_to_sheet(globalData)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"HoSo")

XLSX.writeFile(wb,"HoSoDiaChinh.xlsx")

}

}

/***********************
INIT
************************/

async function init(){

const data=await API.getHoSo()

Table.render(data)

}

init()

</script>

</body>
</html>
