<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Quản lý hồ sơ địa chính</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f1f5f9;
}

.sidebar{
width:240px;
height:100vh;
position:fixed;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:30px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
background:#334155;
border:none;
color:white;
padding:10px;
border-radius:6px;
}

.sidebar button:hover{
background:#475569;
}

.main{
margin-left:260px;
padding:25px;
}

.card-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.quahan{
background:#fecaca !important;
}

.sapdenhan{
background:#fef9c3 !important;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>📁 Hồ sơ địa chính</h4>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('add')">Thêm hồ sơ</button>
<button onclick="show('list')">Danh sách</button>

</div>

<div class="main">

<h3>HỆ THỐNG QUẢN LÝ HỒ SƠ</h3>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="row mt-3">

<div class="col-md-3">
<div class="card-box">
<h6>Tổng hồ sơ</h6>
<h2 id="total">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box">
<h6>Đang xử lý</h6>
<h2 id="dangXuLy">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box">
<h6>Sắp đến hạn</h6>
<h2 id="sapDenHan">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box">
<h6>Quá hạn</h6>
<h2 id="quaHan">0</h2>
</div>
</div>

</div>

<div class="card-box mt-4">
<canvas id="chart"></canvas>
</div>

</div>

<!-- ADD -->

<div id="add" style="display:none">

<div class="card-box">

<h5>Thêm hồ sơ</h5>

<div class="row">

<div class="col-md-3">
<input id="maHS" class="form-control" placeholder="Mã hồ sơ">
</div>

<div class="col-md-3">
<select id="maThuTuc" class="form-control"></select>
</div>

<div class="col-md-3">
<input id="nguoiNop" class="form-control" placeholder="Người nộp">
</div>

<div class="col-md-3">
<input type="date" id="ngayNhan" class="form-control">
</div>

</div>

<div class="row mt-3">

<div class="col-md-3">
<input id="canBo" class="form-control" placeholder="Cán bộ">
</div>

<div class="col-md-3">
<button class="btn btn-primary w-100" onclick="addHoSo()">Lưu hồ sơ</button>
</div>

</div>

</div>

</div>

<!-- LIST -->

<div id="list" style="display:none">

<div class="card-box">

<table id="tableHoSo" class="table table-striped"></table>

</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxAi6WLBCeP87x7iYUP0YvTUw1BJUVsmU0J8tHWKxUz3VhzRDlVLKscaWGSFlEtRP47/exec";

let table;

function show(id){

dashboard.style.display="none";
add.style.display="none";
list.style.display="none";

document.getElementById(id).style.display="block";

}

async function dashboardData(){

const res=await fetch(API+"?action=dashboard");
const data=await res.json();

total.innerText=data.total;
dangXuLy.innerText=data.dangXuLy;
sapDenHan.innerText=data.sapDenHan;
quaHan.innerText=data.quaHan;

drawChart(data);

}

function drawChart(data){

new Chart(document.getElementById("chart"),{

type:"doughnut",

data:{
labels:["Đang xử lý","Sắp đến hạn","Quá hạn"],
datasets:[{
data:[data.dangXuLy,data.sapDenHan,data.quaHan]
}]
}

});

}

async function loadThuTuc(){

const res=await fetch(API+"?action=getThuTuc");
const data=await res.json();

maThuTuc.innerHTML="";

data.slice(1).forEach(r=>{

const opt=document.createElement("option");

opt.value=r[1];
opt.text=r[2];

maThuTuc.appendChild(opt);

});

}

async function loadTable(){

const res=await fetch(API+"?action=getHoSo");
const data=await res.json();

if(table) table.destroy();

table=$('#tableHoSo').DataTable({

data:data.slice(1),

columns:data[0].map(h=>({title:h})),

createdRow:function(row,data){

const trangThai=data[11];

if(trangThai==="Quá hạn"){

$(row).addClass("quahan");

}

if(trangThai==="Sắp đến hạn"){

$(row).addClass("sapdenhan");

}

}

});

}

async function addHoSo(){

const data={

maHS:maHS.value,
maThuTuc:maThuTuc.value,
nguoiNop:nguoiNop.value,
ngayNhan:ngayNhan.value,
canBo:canBo.value

};

await fetch(API+"?action=addHoSo",{

method:"POST",
body:JSON.stringify(data)

});

alert("Đã thêm hồ sơ");

loadTable();
dashboardData();

}

dashboardData();
loadThuTuc();
loadTable();

</script>

</body>
</html>
