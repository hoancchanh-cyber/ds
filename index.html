<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Hệ thống quản lý hồ sơ địa chính</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
background:#f1f5f9;
font-family:Segoe UI;
}

.sidebar{
width:240px;
height:100vh;
position:fixed;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
background:#334155;
border:none;
color:white;
padding:10px;
border-radius:6px;
}

.sidebar button:hover{
background:#475569;
}

.main{
margin-left:260px;
padding:25px;
}

.card-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.quahan{
background:#fecaca !important;
}

.sapdenhan{
background:#fef9c3 !important;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>📁 Hồ sơ địa chính</h4>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('add')">Thêm hồ sơ</button>
<button onclick="show('list')">Danh sách</button>
<button onclick="exportExcel()">Xuất Excel</button>

</div>

<div class="main">

<h3>HỆ THỐNG QUẢN LÝ HỒ SƠ</h3>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="row mt-3">

<div class="col-md-3">
<div class="card-box">
<h6>Tổng hồ sơ</h6>
<h2 id="total">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box">
<h6>Đang xử lý</h6>
<h2 id="dangXuLy">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box">
<h6>Sắp đến hạn</h6>
<h2 id="sapDenHan">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box">
<h6>Quá hạn</h6>
<h2 id="quaHan">0</h2>
</div>
</div>

</div>

<div class="card-box mt-4">
<canvas id="chart"></canvas>
</div>

</div>

<!-- ADD -->

<div id="add" style="display:none">

<div class="card-box">

<h5>Thêm hồ sơ</h5>

<div class="row">

<div class="col-md-3">
<input id="maHS" class="form-control" placeholder="Mã hồ sơ">
</div>

<div class="col-md-3">
<select id="maThuTuc" class="form-control"></select>
</div>

<div class="col-md-3">
<input id="nguoiNop" class="form-control" placeholder="Người nộp">
</div>

<div class="col-md-3">
<input type="date" id="ngayNhan" class="form-control">
</div>

</div>

<div class="row mt-3">

<div class="col-md-3">
<input id="canBo" class="form-control" placeholder="Cán bộ">
</div>

<div class="col-md-3">
<button class="btn btn-primary w-100" onclick="addHoSo()">Lưu</button>
</div>

</div>

</div>

</div>

<!-- LIST -->

<div id="list" style="display:none">

<div class="card-box">

<div class="row mb-3">

<div class="col-md-3">
<select id="filterTrangThai" class="form-control">
<option value="">Tất cả</option>
<option>Đang xử lý</option>
<option>Sắp đến hạn</option>
<option>Quá hạn</option>
<option>Hoàn thành</option>
</select>
</div>

<div class="col-md-3">
<button class="btn btn-secondary" onclick="locTrangThai()">Lọc</button>
</div>

</div>

<table id="tableHoSo" class="table table-striped"></table>

</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxAi6WLBCeP87x7iYUP0YvTUw1BJUVsmU0J8tHWKxUz3VhzRDlVLKscaWGSFlEtRP47/exec"

let table
let globalData=[]

function show(id){

dashboard.style.display="none"
add.style.display="none"
list.style.display="none"

document.getElementById(id).style.display="block"

}

async function dashboardData(){

const res=await fetch(API+"?action=dashboard")
const data=await res.json()

total.innerText=data.total
dangXuLy.innerText=data.dangXuLy
sapDenHan.innerText=data.sapDenHan
quaHan.innerText=data.quaHan

drawChart(data)

}

function drawChart(data){

new Chart(document.getElementById("chart"),{

type:"doughnut",

data:{
labels:["Đang xử lý","Sắp đến hạn","Quá hạn"],
datasets:[{
data:[data.dangXuLy,data.sapDenHan,data.quaHan]
}]
}

})

}

async function loadThuTuc(){

const res=await fetch(API+"?action=getThuTuc")
const data=await res.json()

maThuTuc.innerHTML=""

data.slice(1).forEach(r=>{

const opt=document.createElement("option")

opt.value=r[1]
opt.text=r[2]

maThuTuc.appendChild(opt)

})

}

async function loadTable(){

const res=await fetch(API+"?action=getHoSo")
const data=await res.json()

globalData=data

renderTable(data.slice(1),data[0])

}

function renderTable(rows,header){

if(table) table.destroy()

table=$('#tableHoSo').DataTable({

data:rows,
columns:header.map(h=>({title:h})),

createdRow:function(row,data){

if(data[11]==="Quá hạn"){

$(row).addClass("quahan")

}

if(data[11]==="Sắp đến hạn"){

$(row).addClass("sapdenhan")

}

}

})

}

function locTrangThai(){

const tt=filterTrangThai.value

if(!tt){

renderTable(globalData.slice(1),globalData[0])
return

}

const rows=globalData.slice(1).filter(r=>r[11]===tt)

renderTable(rows,globalData[0])

}

async function addHoSo(){

const data={

maHS:maHS.value,
maThuTuc:maThuTuc.value,
nguoiNop:nguoiNop.value,
ngayNhan:ngayNhan.value,
canBo:canBo.value

}

await fetch(API+"?action=addHoSo",{

method:"POST",
body:JSON.stringify(data)

})

alert("Đã lưu hồ sơ")

loadTable()
dashboardData()

}

function exportExcel(){

const ws=XLSX.utils.aoa_to_sheet(globalData)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"HoSo")

XLSX.writeFile(wb,"HoSoDiaChinh.xlsx")

}

dashboardData()
loadThuTuc()
loadTable()

</script>

</body>
</html>
